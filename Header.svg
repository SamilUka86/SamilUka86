<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <style>
      .title {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 55px;
        font-weight: bold;
        fill: #ffffff;
      }
      .icon {
        font-family: Arial, sans-serif;
        font-size: 35px;
        animation: fall linear infinite;
        opacity: 0;
      }
      @keyframes fall {
        0% { transform: translateY(-40px); opacity: 0; }
        10% { opacity: 0.7; }
        85% { opacity: 0.7; }
        100% { transform: translateY(290px); opacity: 0; }
      }
      /* Fast fall speeds & staggered delays */
      .d1 { animation-duration: 1.8s; animation-delay: 0.1s; }
      .d2 { animation-duration: 1.5s; animation-delay: 0.4s; }
      .d3 { animation-duration: 2.1s; animation-delay: 0.2s; }
      .d4 { animation-duration: 1.6s; animation-delay: 0.7s; }
      .d5 { animation-duration: 1.9s; animation-delay: 0.9s; }
      .d6 { animation-duration: 2.2s; animation-delay: 0.3s; }
      .d7 { animation-duration: 1.4s; animation-delay: 0.8s; }
      .d8 { animation-duration: 2.0s; animation-delay: 0.5s; }
      .d9 { animation-duration: 1.7s; animation-delay: 1.1s; }
    </style>
  </defs>

  <!-- Purple Gradient Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4B0082" />
      <stop offset="50%" stop-color="#7B2FF7" />
      <stop offset="100%" stop-color="#8A2BE2" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Falling Tech Stack Icons -->
  <g>
    <text x="8%" y="-30" class="icon d1">🐍</text>
    <text x="18%" y="-30" class="icon d2">☕</text>
    <text x="28%" y="-30" class="icon d3">⚛️</text>
    <text x="38%" y="-30" class="icon d4">🐘</text>
    <text x="48%" y="-30" class="icon d5">🍃</text>
    <text x="60%" y="-30" class="icon d6">🌐</text>
    <text x="72%" y="-30" class="icon d7">🗄️</text>
    <text x="82%" y="-30" class="icon d8">⚙️</text>
    <text x="92%" y="-30" class="icon d9">💻</text>
  </g>

  <!-- Foreground Name (Stays on top of icons) -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="title">Samil Uka</text>
</svg>
