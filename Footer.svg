<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%" height="150">
  <defs>
    <style>
      .icon {
        font-family: Arial, sans-serif;
        font-size: 30px;
        animation: fall linear infinite;
        opacity: 0;
      }
      @keyframes fall {
        0% { transform: translateY(-40px); opacity: 0; }
        15% { opacity: 0.6; }
        85% { opacity: 0.6; }
        100% { transform: translateY(190px); opacity: 0; }
      }
      .d1 { animation-duration: 1.8s; animation-delay: 0.1s; }
      .d2 { animation-duration: 1.5s; animation-delay: 0.4s; }
      .d3 { animation-duration: 2.1s; animation-delay: 0.2s; }
      .d4 { animation-duration: 1.6s; animation-delay: 0.7s; }
      .d5 { animation-duration: 1.9s; animation-delay: 0.9s; }
      .d6 { animation-duration: 2.2s; animation-delay: 0.3s; }
      .d7 { animation-duration: 1.4s; animation-delay: 0.8s; }
      .d8 { animation-duration: 2.0s; animation-delay: 0.5s; }
    </style>
    <linearGradient id="bg-footer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="50%" stop-color="#7B2FF7" />
      <stop offset="100%" stop-color="#4B0082" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-footer)" />

  <g>
    <text x="10%" y="-30" class="icon d1">🐍</text>
    <text x="22%" y="-30" class="icon d2">☕</text>
    <text x="34%" y="-30" class="icon d3">⚛️</text>
    <text x="46%" y="-30" class="icon d4">🐘</text>
    <text x="58%" y="-30" class="icon d5">🍃</text>
    <text x="70%" y="-30" class="icon d6">🌐</text>
    <text x="82%" y="-30" class="icon d7">🗄️</text>
    <text x="94%" y="-30" class="icon d8">⚙️</text>
  </g>
</svg>
