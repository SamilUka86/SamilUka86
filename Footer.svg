<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 150" width="100%" height="150">
  <defs>
    <!-- Background Gradient (Reversed to anchor the bottom of the page) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" />
      <stop offset="50%" stop-color="#7B2FF7" />
      <stop offset="100%" stop-color="#4B0082" />
    </linearGradient>
    
    <!-- Animations and Styling -->
    <style>
      .subtitle {
        font-family: 'Courier New', monospace;
        font-size: 22px;
        font-weight: bold;
        fill: #E9D5FF;
        text-anchor: middle;
        dominant-baseline: middle;
        opacity: 0;
        animation: textCycle 15s infinite;
      }
      .icon {
        font-family: Arial, sans-serif;
        font-size: 32px;
        animation: fall linear infinite;
        opacity: 0;
      }
      
      /* Falling Animation optimized for footer height */
      @keyframes fall {
        0% { transform: translateY(-20px); opacity: 0; }
        15% { opacity: 0.8; }
        85% { opacity: 0.8; }
        100% { transform: translateY(170px); opacity: 0; }
      }

      /* Looping Text Animation (3 phrases, 15 seconds total) */
      @keyframes textCycle {
        0%, 25% { opacity: 1; transform: translateY(0); }
        33%, 100% { opacity: 0; transform: translateY(5px); }
      }
      
      /* Individual drop speeds and delays */
      .d1 { animation-duration: 2.0s; animation-delay: 0.1s; }
      .d2 { animation-duration: 1.5s; animation-delay: 0.5s; }
      .d3 { animation-duration: 2.2s; animation-delay: 0.2s; }
      .d4 { animation-duration: 1.7s; animation-delay: 0.8s; }
      .d5 { animation-duration: 2.1s; animation-delay: 0.4s; }
      .d6 { animation-duration: 1.6s; animation-delay: 0.9s; }
      .d7 { animation-duration: 1.9s; animation-delay: 0.6s; }
      .d8 { animation-duration: 2.3s; animation-delay: 0.3s; }
      .d9 { animation-duration: 1.4s; animation-delay: 0.7s; }
      .d10 { animation-duration: 1.8s; animation-delay: 0.2s; }

      /* Subtitle display timings */
      .s1 { animation-delay: 0s; }
      .s2 { animation-delay: 5s; }
      .s3 { animation-delay: 10s; }
    </style>
  </defs>

  <!-- Flat Rectangular Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Falling Tech Stack Icons (Spread out for 1000px width) -->
  <g>
    <text x="5%" y="-10" class="icon d1">🐍</text>
    <text x="15%" y="-10" class="icon d2">☕</text>
    <text x="25%" y="-10" class="icon d3">⚛️</text>
    <text x="35%" y="-10" class="icon d4">🐘</text>
    <text x="45%" y="-10" class="icon d5">🍃</text>
    <text x="55%" y="-10" class="icon d6">🌐</text>
    <text x="65%" y="-10" class="icon d7">🗄️</text>
    <text x="75%" y="-10" class="icon d8">⚙️</text>
    <text x="85%" y="-10" class="icon d9">💻</text>
    <text x="95%" y="-10" class="icon d10">🚀</text>
  </g>

  <!-- Looping Subtitles -->
  <g>
    <text x="500" y="75" class="subtitle s1">Code with purpose. Build with passion.</text>
    <text x="500" y="75" class="subtitle s2">Transforming ideas into scalable software solutions.</text>
    <text x="500" y="75" class="subtitle s3">Learning, building, and innovating—one project at a time.</text>
  </g>
</svg>
